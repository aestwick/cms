<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPFK Latest Playlist</title>
  <style>
    .kpfk-playlist * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    .kpfk-playlist {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 16px;
      line-height: 1.5;
      color: #1a1a1a;
      background: #fff;
      max-width: 840px;
      border: 3px solid #1a1a1a;
    }
    
    .kpfk-playlist__header {
      background: #1a1a1a;
      color: #fff;
      padding: 16px 20px;
      border-bottom: 4px solid #c41e3a;
    }
    
    .kpfk-playlist__label {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #c41e3a;
      margin-bottom: 4px;
    }
    
    .kpfk-playlist__title {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 900;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      margin: 0;
    }
    
    .kpfk-playlist__date {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 14px;
      font-style: italic;
      color: #999;
      margin-top: 4px;
    }
    
    .kpfk-playlist__tracks {
      padding: 0;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .kpfk-playlist__track {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px 20px;
      border-bottom: 1px solid #e0e0e0;
      align-items: center;
    }
    
    .kpfk-playlist__track:nth-child(odd) {
      background: #fafafa;
    }
    
    .kpfk-playlist__track:last-child {
      border-bottom: none;
    }
    
    .kpfk-playlist__track:hover {
      background: #f5f5f5;
    }
    
    .kpfk-playlist__track-main {
      min-width: 0;
      line-height: 1.3;
    }
    
    .kpfk-playlist__song {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #1a1a1a;
    }
    
    .kpfk-playlist__artist {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 13px;
      color: #555;
    }
    
    .kpfk-playlist__meta {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 12px;
      color: #888;
      font-style: italic;
    }
    
    .kpfk-playlist__time {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #777;
      text-align: right;
      white-space: nowrap;
    }
    
    .kpfk-playlist__loading {
      padding: 40px 20px;
      text-align: center;
    }
    
    .kpfk-playlist__spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #e0e0e0;
      border-top-color: #c41e3a;
      border-radius: 0;
      animation: kpfk-spin 0.8s linear infinite;
    }
    
    @keyframes kpfk-spin {
      to { transform: rotate(360deg); }
    }
    
    .kpfk-playlist__loading-text {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #555;
      margin-top: 12px;
    }
    
    .kpfk-playlist__error {
      padding: 24px 20px;
      background: #fff5f5;
      border-left: 4px solid #c41e3a;
    }
    
    .kpfk-playlist__error-title {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      color: #c41e3a;
      margin-bottom: 4px;
    }
    
    .kpfk-playlist__error-text {
      font-size: 14px;
      color: #555;
    }
    
    .kpfk-playlist__empty {
      padding: 40px 20px;
      text-align: center;
      color: #666;
    }
    
    .kpfk-playlist__footer {
      padding: 12px 20px;
      background: #f5f5f5;
      border-top: 2px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .kpfk-playlist__count {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
    }
    
    .kpfk-playlist__link {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #c41e3a;
      text-decoration: none;
      border-bottom: 2px solid transparent;
    }
    
    .kpfk-playlist__link:hover {
      border-bottom-color: #c41e3a;
    }
    
    @media (max-width: 480px) {
      .kpfk-playlist__header {
        padding: 12px 16px;
      }
      
      .kpfk-playlist__title {
        font-size: 16px;
      }
      
      .kpfk-playlist__track {
        padding: 8px 16px;
      }
      
      .kpfk-playlist__song {
        font-size: 13px;
      }
      
      .kpfk-playlist__artist {
        font-size: 12px;
      }
      
      .kpfk-playlist__meta {
        font-size: 11px;
      }
      
      .kpfk-playlist__footer {
        padding: 10px 16px;
      }
    }
  </style>
</head>
<body>

  <!-- COMPONENT START -->
  <div class="kpfk-playlist" id="kpfk-playlist-latest">
    <div class="kpfk-playlist__loading">
      <div class="kpfk-playlist__spinner"></div>
      <div class="kpfk-playlist__loading-text">Loading playlist...</div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';
    
    function getShowKey() {
      const showKeyEl = document.getElementById('show-key');
      if (showKeyEl && showKeyEl.textContent.trim()) {
        return showKeyEl.textContent.trim();
      }
      return null;
    }
    
    const showKey = getShowKey();
    
    if (!showKey) {
      document.getElementById('kpfk-playlist-latest').innerHTML = `
        <div class="kpfk-playlist__error">
          <div class="kpfk-playlist__error-title">Configuration Error</div>
          <div class="kpfk-playlist__error-text">No #show-key element found on page.</div>
        </div>
      `;
      return;
    }
    
    const CONFIG = {
      showKey: showKey,
      apiBase: 'https://confessor.kpfk.org/_nu_do_api.php'
    };
    
    const container = document.getElementById('kpfk-playlist-latest');
    
    async function fetchPlaylist() {
      const url = `${CONFIG.apiBase}?req=mostrecent&altid=${encodeURIComponent(CONFIG.showKey)}&json=1`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return await response.json();
    }
    
    function decodeHtml(html) {
      const txt = document.createElement('textarea');
      txt.innerHTML = html;
      return txt.value;
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    
    function renderPlaylist(data) {
      const show = data.show || {};
      const showName = show.name || 'Unknown Show';
      const showDate = show.date || '';
      const showTime = show.time || '';
      
      // Extract tracks - numbered keys like "2", "3", "5", etc.
      const tracks = [];
      for (const key of Object.keys(data)) {
        if (!isNaN(parseInt(key)) && data[key].title) {
          tracks.push({
            sort: parseInt(key),
            title: decodeHtml(data[key].title || ''),
            artist: decodeHtml(data[key].artist || ''),
            album: decodeHtml(data[key].album || ''),
            label: decodeHtml(data[key].label || ''),
            time: data[key].start || ''
          });
        }
      }
      
      tracks.sort((a, b) => a.sort - b.sort);
      
      let tracksHtml = '';
      
      if (tracks.length === 0) {
        tracksHtml = '<div class="kpfk-playlist__empty">No tracks available for this playlist.</div>';
      } else {
        tracksHtml = tracks.map(track => `
          <div class="kpfk-playlist__track">
            <div class="kpfk-playlist__track-main">
              <div class="kpfk-playlist__song">${escapeHtml(track.title)}</div>
              <div class="kpfk-playlist__artist">${escapeHtml(track.artist)}</div>
              ${track.album ? `<div class="kpfk-playlist__meta">${escapeHtml(track.album)}${track.label ? ` · ${escapeHtml(track.label)}` : ''}</div>` : ''}
            </div>
            <div class="kpfk-playlist__time">${escapeHtml(track.time)}</div>
          </div>
        `).join('');
      }
      
      container.innerHTML = `
        <header class="kpfk-playlist__header">
          <div class="kpfk-playlist__label">Current Playlist</div>
          <h2 class="kpfk-playlist__title">${escapeHtml(showName)}</h2>
          <div class="kpfk-playlist__date">${escapeHtml(showDate)}${showTime ? ' · ' + escapeHtml(showTime) : ''}</div>
        </header>
        <div class="kpfk-playlist__tracks">
          ${tracksHtml}
        </div>
        <footer class="kpfk-playlist__footer">
          <span class="kpfk-playlist__count">${tracks.length} track${tracks.length !== 1 ? 's' : ''}</span>
          <a href="#" class="kpfk-playlist__link">View Previous Playlists →</a>
        </footer>
      `;
    }
    
    function renderError(message) {
      container.innerHTML = `
        <header class="kpfk-playlist__header">
          <div class="kpfk-playlist__label">Current Playlist</div>
          <h2 class="kpfk-playlist__title">Playlist</h2>
        </header>
        <div class="kpfk-playlist__error">
          <div class="kpfk-playlist__error-title">Unable to load playlist</div>
          <div class="kpfk-playlist__error-text">${escapeHtml(message)}</div>
        </div>
      `;
    }
    
    fetchPlaylist()
      .then(data => renderPlaylist(data))
      .catch(err => {
        console.error('KPFK Playlist Error:', err);
        renderError('Please try refreshing the page.');
      });
  })();
  </script>
  <!-- COMPONENT END -->

</body>
</html>
