<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPFK Previous Playlists</title>
  <style>
    .kpfk-browser * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    .kpfk-browser {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 16px;
      line-height: 1.5;
      color: #1a1a1a;
      background: #fff;
      max-width: 840px;
      border: 3px solid #1a1a1a;
    }
    
    .kpfk-browser__header {
      background: #1a1a1a;
      color: #fff;
      padding: 16px 20px;
      border-bottom: 4px solid #c41e3a;
    }
    
    .kpfk-browser__label {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #c41e3a;
      margin-bottom: 4px;
    }
    
    .kpfk-browser__title {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 900;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      margin: 0;
    }
    
    .kpfk-browser__controls {
      padding: 16px 20px;
      background: #f5f5f5;
      border-bottom: 2px solid #e0e0e0;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .kpfk-browser__select-wrapper {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    
    .kpfk-browser__select {
      width: 100%;
      padding: 10px 36px 10px 12px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      background: #fff;
      border: 2px solid #1a1a1a;
      border-radius: 0;
      appearance: none;
      cursor: pointer;
    }
    
    .kpfk-browser__select:focus {
      outline: none;
      border-color: #c41e3a;
    }
    
    .kpfk-browser__select-arrow {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #555;
    }
    
    .kpfk-browser__quick {
      padding: 12px 20px;
      border-bottom: 1px solid #e0e0e0;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    
    .kpfk-browser__quick-label {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      margin-bottom: 8px;
    }
    
    .kpfk-browser__quick-list {
      display: flex;
      gap: 8px;
    }
    
    .kpfk-browser__quick-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #555;
      background: #fff;
      border: 2px solid #ddd;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .kpfk-browser__quick-btn:hover {
      border-color: #c41e3a;
      color: #c41e3a;
    }
    
    .kpfk-browser__quick-btn--active {
      background: #1a1a1a;
      border-color: #1a1a1a;
      color: #fff;
    }
    
    .kpfk-browser__content {
      min-height: 200px;
    }
    
    .kpfk-browser__tracks {
      padding: 0;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .kpfk-browser__track {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px 20px;
      border-bottom: 1px solid #e0e0e0;
      align-items: center;
    }
    
    .kpfk-browser__track:nth-child(odd) {
      background: #fafafa;
    }
    
    .kpfk-browser__track:last-child {
      border-bottom: none;
    }
    
    .kpfk-browser__track:hover {
      background: #f5f5f5;
    }
    
    .kpfk-browser__track-main {
      min-width: 0;
      line-height: 1.3;
    }
    
    .kpfk-browser__song {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #1a1a1a;
    }
    
    .kpfk-browser__artist {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 13px;
      color: #555;
    }
    
    .kpfk-browser__meta {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 12px;
      color: #888;
      font-style: italic;
    }
    
    .kpfk-browser__time {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #777;
      text-align: right;
      white-space: nowrap;
    }
    
    .kpfk-browser__selected {
      padding: 12px 20px;
      background: #f9f9f9;
      border-bottom: 2px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .kpfk-browser__selected-date {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 14px;
    }
    
    .kpfk-browser__selected-count {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
    }
    
    .kpfk-browser__loading {
      padding: 40px 20px;
      text-align: center;
    }
    
    .kpfk-browser__spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #e0e0e0;
      border-top-color: #c41e3a;
      border-radius: 0;
      animation: kpfk-spin 0.8s linear infinite;
    }
    
    @keyframes kpfk-spin {
      to { transform: rotate(360deg); }
    }
    
    .kpfk-browser__loading-text {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #555;
      margin-top: 12px;
    }
    
    .kpfk-browser__empty {
      padding: 48px 20px;
      text-align: center;
    }
    
    .kpfk-browser__empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.3;
    }
    
    .kpfk-browser__empty-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 15px;
      color: #666;
    }
    
    .kpfk-browser__error {
      padding: 24px 20px;
      background: #fff5f5;
      border-left: 4px solid #c41e3a;
      margin: 20px;
    }
    
    .kpfk-browser__error-title {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      color: #c41e3a;
      margin-bottom: 4px;
    }
    
    .kpfk-browser__error-text {
      font-size: 14px;
      color: #555;
    }
    
    @media (max-width: 480px) {
      .kpfk-browser__header {
        padding: 12px 16px;
      }
      
      .kpfk-browser__title {
        font-size: 16px;
      }
      
      .kpfk-browser__controls {
        padding: 12px 16px;
      }
      
      .kpfk-browser__quick {
        padding: 10px 16px;
      }
      
      .kpfk-browser__track {
        padding: 8px 16px;
      }
      
      .kpfk-browser__song {
        font-size: 13px;
      }
      
      .kpfk-browser__artist {
        font-size: 12px;
      }
      
      .kpfk-browser__meta {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

  <!-- COMPONENT START -->
  <div class="kpfk-browser" id="kpfk-playlist-browser">
    <div class="kpfk-browser__loading">
      <div class="kpfk-browser__spinner"></div>
      <div class="kpfk-browser__loading-text">Loading playlists...</div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';
    
    function getShowKey() {
      const showKeyEl = document.getElementById('show-key');
      if (showKeyEl && showKeyEl.textContent.trim()) {
        return showKeyEl.textContent.trim();
      }
      return null;
    }
    
    const showKey = getShowKey();
    
    if (!showKey) {
      document.getElementById('kpfk-playlist-browser').innerHTML = `
        <div class="kpfk-browser__error">
          <div class="kpfk-browser__error-title">Configuration Error</div>
          <div class="kpfk-browser__error-text">No #show-key element found on page.</div>
        </div>
      `;
      return;
    }
    
    const CONFIG = {
      showKey: showKey,
      apiBase: 'https://confessor.kpfk.org/_nu_do_api.php',
      quickPickCount: 8
    };
    
    const container = document.getElementById('kpfk-playlist-browser');
    
    let allDates = [];
    let currentPhid = null;
    
    async function fetchDates() {
      const url = `${CONFIG.apiBase}?req=shotimes&key=${encodeURIComponent(CONFIG.showKey)}&json=1`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const data = await response.json();
      // API returns: [{dt, phid, date:"Fri 16 Jan, 2026", name, producer, time, type}, ...]
      return data.map(item => ({
        phid: item.phid,
        date: item.date,
        time: item.time,
        name: item.name,
        unix: item.dt
      }));
    }
    
    async function fetchPlaylist(phid) {
      const url = `${CONFIG.apiBase}?req=playlist&phid=${phid}&json=1`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return await response.json();
    }
    
    function decodeHtml(html) {
      const txt = document.createElement('textarea');
      txt.innerHTML = html;
      return txt.value;
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    
    function renderShell() {
      const quickPicks = allDates.slice(0, CONFIG.quickPickCount);
      
      container.innerHTML = `
        <header class="kpfk-browser__header">
          <div class="kpfk-browser__label">Playlist Archive</div>
          <h2 class="kpfk-browser__title">Previous Playlists</h2>
        </header>
        
        <div class="kpfk-browser__controls">
          <div class="kpfk-browser__select-wrapper">
            <select class="kpfk-browser__select" id="kpfk-date-select">
              <option value="">Select a date...</option>
              ${allDates.map(d => `<option value="${d.phid}">${d.date} · ${d.time}</option>`).join('')}
            </select>
            <span class="kpfk-browser__select-arrow">▼</span>
          </div>
        </div>
        
        ${quickPicks.length > 0 ? `
        <div class="kpfk-browser__quick">
          <div class="kpfk-browser__quick-label">Recent Shows</div>
          <div class="kpfk-browser__quick-list" id="kpfk-quick-picks">
            ${quickPicks.map(d => `
              <button class="kpfk-browser__quick-btn" data-phid="${d.phid}">${d.date}</button>
            `).join('')}
          </div>
        </div>
        ` : ''}
        
        <div class="kpfk-browser__content" id="kpfk-content">
          <div class="kpfk-browser__empty">
            <div class="kpfk-browser__empty-icon">📻</div>
            <div class="kpfk-browser__empty-text">Select a date above to view that show's playlist</div>
          </div>
        </div>
      `;
      
      document.getElementById('kpfk-date-select').addEventListener('change', handleSelectChange);
      
      const quickBtns = document.querySelectorAll('.kpfk-browser__quick-btn');
      quickBtns.forEach(btn => {
        btn.addEventListener('click', handleQuickPick);
      });
    }
    
    function renderPlaylist(data, dateInfo) {
      const content = document.getElementById('kpfk-content');
      
      // Extract tracks - numbered keys like "2", "3", "5", etc.
      const tracks = [];
      for (const key of Object.keys(data)) {
        if (!isNaN(parseInt(key)) && data[key].title) {
          tracks.push({
            sort: parseInt(key),
            title: decodeHtml(data[key].title || ''),
            artist: decodeHtml(data[key].artist || ''),
            album: decodeHtml(data[key].album || ''),
            label: decodeHtml(data[key].label || ''),
            time: data[key].start || ''
          });
        }
      }
      
      tracks.sort((a, b) => a.sort - b.sort);
      
      let tracksHtml = '';
      
      if (tracks.length === 0) {
        tracksHtml = '<div class="kpfk-browser__empty"><div class="kpfk-browser__empty-text">No tracks available for this playlist.</div></div>';
      } else {
        tracksHtml = `<div class="kpfk-browser__tracks">${tracks.map(track => `
          <div class="kpfk-browser__track">
            <div class="kpfk-browser__track-main">
              <div class="kpfk-browser__song">${escapeHtml(track.title)}</div>
              <div class="kpfk-browser__artist">${escapeHtml(track.artist)}</div>
              ${track.album ? `<div class="kpfk-browser__meta">${escapeHtml(track.album)}${track.label ? ` · ${escapeHtml(track.label)}` : ''}</div>` : ''}
            </div>
            <div class="kpfk-browser__time">${escapeHtml(track.time)}</div>
          </div>
        `).join('')}</div>`;
      }
      
      const dateDisplay = dateInfo ? `${dateInfo.date} · ${dateInfo.time}` : '';
      
      content.innerHTML = `
        <div class="kpfk-browser__selected">
          <div class="kpfk-browser__selected-date">${escapeHtml(dateDisplay)}</div>
          <div class="kpfk-browser__selected-count">${tracks.length} track${tracks.length !== 1 ? 's' : ''}</div>
        </div>
        ${tracksHtml}
      `;
    }
    
    function renderLoading() {
      const content = document.getElementById('kpfk-content');
      content.innerHTML = `
        <div class="kpfk-browser__loading">
          <div class="kpfk-browser__spinner"></div>
          <div class="kpfk-browser__loading-text">Loading playlist...</div>
        </div>
      `;
    }
    
    function renderError(message) {
      const content = document.getElementById('kpfk-content');
      content.innerHTML = `
        <div class="kpfk-browser__error">
          <div class="kpfk-browser__error-title">Unable to load playlist</div>
          <div class="kpfk-browser__error-text">${escapeHtml(message)}</div>
        </div>
      `;
    }
    
    function handleSelectChange(e) {
      const phid = e.target.value;
      if (phid) {
        loadPlaylist(parseInt(phid));
        updateQuickPickActive(parseInt(phid));
      }
    }
    
    function handleQuickPick(e) {
      const phid = parseInt(e.target.dataset.phid);
      loadPlaylist(phid);
      document.getElementById('kpfk-date-select').value = phid;
      updateQuickPickActive(phid);
    }
    
    function updateQuickPickActive(phid) {
      const btns = document.querySelectorAll('.kpfk-browser__quick-btn');
      btns.forEach(btn => {
        btn.classList.toggle('kpfk-browser__quick-btn--active', parseInt(btn.dataset.phid) === phid);
      });
    }
    
    async function loadPlaylist(phid) {
      currentPhid = phid;
      renderLoading();
      
      try {
        const data = await fetchPlaylist(phid);
        const dateInfo = allDates.find(d => d.phid === phid);
        renderPlaylist(data, dateInfo);
      } catch (err) {
        console.error('KPFK Playlist Error:', err);
        renderError('Please try again or select a different date.');
      }
    }
    
    async function init() {
      try {
        allDates = await fetchDates();
        renderShell();
      } catch (err) {
        console.error('KPFK Browser Error:', err);
        container.innerHTML = `
          <header class="kpfk-browser__header">
            <div class="kpfk-browser__label">Playlist Archive</div>
            <h2 class="kpfk-browser__title">Previous Playlists</h2>
          </header>
          <div class="kpfk-browser__error">
            <div class="kpfk-browser__error-title">Unable to load playlist dates</div>
            <div class="kpfk-browser__error-text">Please try refreshing the page.</div>
          </div>
        `;
      }
    }
    
    init();
  })();
  </script>
  <!-- COMPONENT END -->

</body>
</html>
