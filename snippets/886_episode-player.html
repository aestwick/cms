<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPFK Episode Player</title>
    <style>
        /* === PLAYER-SPECIFIC STYLES ONLY === */
        /* Base component styles come from show-page-and-snippet-styling.css */

        /* Player container additions */
        .kpfk-player {
            contain: layout style;
        }

        /* Show image in header */
        .kp-img {
            margin-right: 15px;
            flex-shrink: 0;
        }

        .kp-img img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border: 2px solid #1a1a1a;
        }

        /* RSS button */
        .kp-rss {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            flex-shrink: 0;
            margin-left: 12px;
            transition: background 0.15s;
        }

        .kp-rss:hover {
            background: #c41e3a;
        }

        .kp-rss svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        /* Episode list */
        .kp-episodes {
            max-height: 500px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .kp-episode {
            display: flex;
            align-items: flex-start;
            padding: 10px 16px;
            border-bottom: 1px solid #e0e0e0;
            transition: background-color 0.15s;
        }

        .kp-episode:hover {
            background-color: #f8f8f8;
        }

        .kp-episode:last-child {
            border-bottom: none;
        }

        .kp-episode.playing {
            background-color: #fff;
            border-left: 4px solid #c41e3a;
            padding-left: 12px;
        }

        /* Play button (inline with each episode) */
        .kp-play {
            background: #c41e3a;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            min-width: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-right: 12px;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .kp-play:hover {
            background: #1a1a1a;
        }

        .kp-play svg {
            width: 14px;
            height: 14px;
        }

        /* Episode details */
        .kp-details {
            flex: 1;
            min-width: 0;
        }

        /* Expandable description */
        .kp-desc-wrapper {
            margin-top: 6px;
            margin-bottom: 6px;
        }

        .kp-desc {
            color: #333;
            font-size: 0.85rem;
            line-height: 1.4;
            max-height: 2.8em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .kp-desc.expanded {
            max-height: none;
            -webkit-line-clamp: unset;
        }

        .kp-read-more {
            background: none;
            border: none;
            color: #c41e3a;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 0;
            margin-top: 2px;
            text-decoration: underline;
        }

        .kp-read-more:hover {
            color: #1a1a1a;
        }

        /* Episode actions */
        .kp-ep-actions {
            margin-top: 6px;
        }

        /* Now playing indicator */
        .kp-now-playing {
            display: none;
            color: #c41e3a;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .kp-now-playing::before {
            content: '● ';
            animation: kp-blink 1s infinite;
        }

        @keyframes kp-blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        .kp-now-playing.active {
            display: block;
        }

        /* Spacing when player is active */
        body.kp-player-active .kp-episodes {
            max-height: 350px;
            padding-bottom: 130px;
        }

        /* === FIXED PLAYBACK BAR === */
        .kp-controls {
            display: none;
            background: #1a1a1a;
            color: white;
            padding: 12px 16px;
        }

        .kp-controls.active {
            display: block;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10000;
        }

        .kp-current-info {
            margin-bottom: 10px;
        }

        .kp-current-title {
            font-weight: 700;
            font-size: 0.85rem;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .kp-current-date {
            color: #999;
            font-size: 0.75rem;
            font-family: 'Courier New', monospace;
        }

        .kp-progress {
            background: #333;
            height: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            overflow: hidden;
        }

        .kp-progress-fill {
            background: #c41e3a;
            height: 100%;
            width: 0%;
            transition: width 0.1s;
            position: relative;
        }

        .kp-progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 12px;
            background: #fff;
        }

        .kp-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .kp-playback-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kp-control-play {
            background: #c41e3a;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
        }

        .kp-control-play:hover {
            background: #fff;
            color: #1a1a1a;
        }

        .kp-control-play svg {
            width: 18px;
            height: 18px;
        }

        .kp-skip {
            background: transparent;
            color: #999;
            border: none;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.15s;
        }

        .kp-skip:hover {
            color: #fff;
        }

        .kp-skip svg {
            width: 20px;
            height: 20px;
        }

        .kp-time {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: #999;
        }

        .kp-speeds {
            display: flex;
            gap: 4px;
        }

        .kp-speed {
            background: transparent;
            color: #666;
            border: 1px solid #444;
            padding: 3px 8px;
            font-size: 0.7rem;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
        }

        .kp-speed:hover {
            border-color: #c41e3a;
            color: #c41e3a;
        }

        .kp-speed.active {
            background: #c41e3a;
            border-color: #c41e3a;
            color: #fff;
        }

        /* === RESPONSIVE === */
        @media (max-width: 480px) {
            .kp-img img {
                width: 60px;
                height: 60px;
            }

            .kp-episode {
                padding: 8px 12px;
            }

            .kp-episode.playing {
                padding-left: 8px;
            }

            .kp-controls {
                padding: 10px 12px;
            }

            .kp-bottom {
                flex-direction: column;
                gap: 8px;
            }

            .kp-playback-controls {
                order: 1;
            }

            .kp-time {
                order: 2;
            }

            .kp-speeds {
                order: 3;
                width: 100%;
                justify-content: center;
            }

            body.kp-player-active .kp-episodes {
                max-height: 300px;
                padding-bottom: 150px;
            }
        }
    </style>
</head>
<body>
    <div id="kpfk-player"></div>

    <script>
        class KPFKPlayer {
            constructor(containerId = 'kpfk-player', options = {}) {
                this.audio = null;
                this.currentEpisodeEl = null;
                this.playing = false;
                this.episodes = [];
                this.currentPage = 1;
                this.autoplayNext = true;
                this.episodesPerPage = 6;
                this.loading = false;
                this.currentIndex = -1;
                this.currentEpisode = null;
                
                this.supabaseUrl = 'https://czjhwhfqohpmwprhasve.supabase.co';
                this.supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6amh3aGZxb2hwbXdwcmhhc3ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5Njc0NTYsImV4cCI6MjA4MjU0MzQ1Nn0.UCT-1wTR1Qn0VX8KeE6ZxKqF5gslLXL0XF6bh6UtwO4';
                this.enrichedData = {};
                
                this.container = document.getElementById(containerId);
                if (!this.container) {
                    console.error(`KPFK Player: Container #${containerId} not found`);
                    return;
                }
                
                this.buildMailtoLink = (errorType, errorDetail) => {
                    const e = ['webmaster', 'kpfk', 'org'].join('@').replace('@org', '.org');
                    const subject = encodeURIComponent(`Episode Player Error: ${errorType}`);
                    const body = encodeURIComponent(
                        `Hi,\n\nI encountered an error on the episode player.\n\n` +
                        `Page: ${window.location.href}\n` +
                        `Error: ${errorType}\n` +
                        `Detail: ${errorDetail}\n` +
                        `Time: ${new Date().toISOString()}\n\n` +
                        `Thanks!`
                    );
                    return `mailto:${e}?subject=${subject}&body=${body}`;
                };
                
                this.container.classList.add('kpfk-component', 'kpfk-player');

                this.showCode = options.show || this.getShowCode();
                if (!this.showCode) {
                    this.container.innerHTML = `
                        <div class="kpfk-state kpfk-state--error">
                            <div class="kpfk-state__title">Episodes Unavailable</div>
                            <div class="kpfk-state__text">Episodes unavailable right now. <a href="${this.buildMailtoLink('Config', 'show-key not found')}">Report this issue</a></div>
                        </div>`;
                    return;
                }

                this.showInfo = { title: '', subtitle: '', image: '' };
                this.progressBar = null;
                this.progressFill = null;
                this.currentTimeEl = null;
                this.totalTimeEl = null;

                this.container.innerHTML = `
                    <div class="kpfk-state kpfk-state--loading">
                        <div class="kpfk-spinner"></div>
                        <div class="kpfk-state__text">Loading episodes...</div>
                    </div>`;
                this.init();
            }

            getShowCode() {
                const showKeyEl = document.getElementById('show-key');
                if (showKeyEl && showKeyEl.textContent.trim()) {
                    return showKeyEl.textContent.trim();
                }
                if (this.container.dataset.show) {
                    return this.container.dataset.show;
                }
                return null;
            }

            async init() {
                try {
                    await this.loadShowInfo();
                    await this.loadEpisodes();
                    await this.enrichEpisodes();
                    this.render();
                    this.bindEvents();
                } catch (e) {
                    console.error('KPFK Player init failed:', e);
                    this.container.innerHTML = `
                        <div class="kpfk-state kpfk-state--error">
                            <div class="kpfk-state__title">Unable to Load Episodes</div>
                            <div class="kpfk-state__text">Please try refreshing the page. <a href="${this.buildMailtoLink('Init', e.message)}">Report this issue</a></div>
                        </div>`;
                }
            }

            async loadShowInfo() {
                try {
                    const response = await fetch(`https://confessor.kpfk.org/_nu_do_api.php?req=key&key=${this.showCode}&json=1`);
                    const text = await response.text();
                    let showData = null;
                    try { showData = JSON.parse(text); } catch (e) {}
                    
                    this.showInfo = showData?.sh_name ? {
                        title: this.decodeHtml(showData.sh_name),
                        subtitle: this.formatSchedule(showData),
                        image: showData.sh_photo ? `https://confessor.kpfk.org/pix/${showData.sh_photo}` : null,
                        host: showData.sh_djname || '',
                        email: showData.sh_email || '',
                        description: showData.sh_desc || ''
                    } : {
                        title: 'KPFK Show',
                        subtitle: 'Streaming from archive.kpfk.org'
                    };
                } catch (e) {
                    this.showInfo = { title: 'KPFK Show', subtitle: 'Streaming from archive.kpfk.org' };
                }
            }

            formatSchedule(showData) {
                if (!showData.sh_days || !showData.sh_ampm) {
                    return 'Streaming from archive.kpfk.org • Listener-powered radio since 1959';
                }
                return `${showData.sh_days} • ${showData.sh_ampm}`;
            }

            async loadEpisodes() {
                try {
                    const response = await fetch(`https://confessor.kpfk.org/_nu_do_api.php?req=fil&id=${this.showCode}&num=50&json=1`);
                    const text = await response.text();
                    let episodes = [];
                    try { episodes = JSON.parse(text); } catch (e) {}
                    
                    this.episodes = [];
                    
                    if (Array.isArray(episodes)) {
                        episodes.forEach(item => {
                            if (!item.mp3) return;
                            
                            const audioUrl = this.fixAudioURL(item.mp3);
                            let dateStr = 'Recent';
                            let shortDate = '';
                            let timestamp = 0;
                            
                            if (item.date) {
                                const dateObj = new Date(item.date);
                                dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                                shortDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                                timestamp = dateObj.getTime();
                            } else if (item.def_time) {
                                const dateObj = new Date(item.def_time * 1000);
                                dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                                shortDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                                timestamp = dateObj.getTime();
                            }

                            let duration = '';
                            if (item.lsecs) {
                                const mins = Math.floor(item.lsecs / 60);
                                const secs = item.lsecs % 60;
                                duration = `${mins}:${secs.toString().padStart(2, '0')}`;
                            }

                            let headline = '', guest = '', summary = '';
                            if (item.pubfile && item.pubfile[0]) {
                                const pf = item.pubfile[0];
                                if (pf.pf_gname) guest = pf.pf_gname;
                                if (pf.pf_gtopic) {
                                    if (pf.pf_gtopic.length <= 150) headline = pf.pf_gtopic;
                                    else summary = pf.pf_gtopic;
                                }
                            }

                            this.episodes.push({
                                title: item.title || this.showInfo.title,
                                date: dateStr,
                                shortDate,
                                duration,
                                producer: item.producer || '',
                                audioUrl,
                                timestamp,
                                headline: headline || null,
                                host: null,
                                guest: guest || null,
                                summary: summary || null
                            });
                        });
                    }
                } catch (e) {
                    this.episodes = [];
                }
            }

            async enrichEpisodes() {
                if (this.episodes.length === 0) return;
                try {
                    const urls = this.episodes.map(e => e.audioUrl);
                    const response = await fetch(
                        `${this.supabaseUrl}/rest/v1/episode_log?mp3_url=in.(${urls.map(u => `"${u}"`).join(',')})&select=mp3_url,headline,host,guest,summary`,
                        { headers: { 'apikey': this.supabaseKey, 'Authorization': `Bearer ${this.supabaseKey}` } }
                    );
                    if (!response.ok) return;
                    const data = await response.json();
                    const enriched = {};
                    data.forEach(row => { enriched[row.mp3_url] = row; });
                    this.episodes.forEach(ep => {
                        const extra = enriched[ep.audioUrl];
                        if (extra) {
                            if (!ep.headline) ep.headline = extra.headline;
                            if (!ep.host) ep.host = extra.host;
                            if (!ep.guest) ep.guest = extra.guest;
                            if (!ep.summary) ep.summary = extra.summary;
                        }
                    });
                } catch (e) {}
            }

            fixAudioURL(url) {
                if (!url) return null;
                if (url.includes('confessor.kpfk.org/home/kpfkarch/public_html/mp3/')) {
                    const filename = url.split('/mp3/')[1];
                    return filename ? `https://archive.kpfk.org/mp3/${filename}` : url;
                }
                return url;
            }

            decodeHtml(html) {
                const txt = document.createElement('textarea');
                txt.innerHTML = html;
                return txt.value;
            }

            render() {
                const info = this.showInfo;
                const totalPages = Math.ceil(this.episodes.length / this.episodesPerPage);
                const start = (this.currentPage - 1) * this.episodesPerPage;
                const pageEpisodes = this.episodes.slice(start, start + this.episodesPerPage);

                let html = '';
                const rssUrl = `https://archive.kpfk.org/xml/${this.showCode}.xml`;
                
                // Header
                html += '<header class="kpfk-component__header">';
                if (info.image) {
                    html += `<div class="kp-img"><img src="${info.image}" alt="${info.title}" onerror="this.parentElement.style.display='none'"></div>`;
                }
                html += `<div class="kpfk-component__header-content">
                    <h2 class="kpfk-component__title">${info.title}</h2>
                    <div class="kpfk-component__subtitle">${info.subtitle}</div>
                </div>
                <a href="${rssUrl}" target="_blank" class="kp-rss" title="Subscribe via RSS">
                    <svg viewBox="0 0 24 24" fill="#ffffff"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19 7.38 20 6.18 20C5 20 4 19 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1Z"/></svg>
                </a>
                </header>`;

                // Episodes
                html += '<div class="kp-episodes">';
                
                if (pageEpisodes.length > 0) {
                    pageEpisodes.forEach((ep, i) => {
                        const index = start + i;
                        const isPlaying = this.currentIndex === index;
                        const displayTitle = ep.headline || `${ep.title} — ${ep.shortDate}`;
                        
                        let descHtml = '';
                        if (ep.summary) {
                            const decoded = this.decodeHtml(ep.summary);
                            descHtml = `<div class="kp-desc-wrapper">
                                <div class="kp-desc">${decoded}</div>
                                <button class="kp-read-more">Read more...</button>
                            </div>`;
                        }

                        html += `
                            <div class="kp-episode${isPlaying ? ' playing' : ''}" data-index="${index}">
                                <button class="kp-play" aria-label="Play episode">
                                    ${isPlaying && this.playing 
                                        ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'
                                        : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'}
                                </button>
                                <div class="kp-details">
                                    <div class="kpfk-track__song">${displayTitle}</div>
                                    <div class="kpfk-track__meta">${ep.date}${ep.duration ? ' • ' + ep.duration : ''}</div>
                                    ${descHtml}
                                    <div class="kp-ep-actions">
                                        <button class="kpfk-btn kpfk-btn--secondary kpfk-btn--small kp-download" data-url="${ep.audioUrl}" data-title="${ep.title}">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                                            Download
                                        </button>
                                    </div>
                                    <div class="kp-now-playing${isPlaying && this.playing ? ' active' : ''}">Now Playing</div>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    html += `
                        <div class="kpfk-state kpfk-state--error">
                            <div class="kpfk-state__title">No Episodes Available</div>
                            <div class="kpfk-state__text">No episodes available for this show. <a href="${this.buildMailtoLink('Empty', 'No episodes returned')}">Report this issue</a></div>
                        </div>`;
                }
                
                html += '</div>';

                // Pagination
                if (totalPages > 1) {
                    html += `
                        <div class="kpfk-pagination">
                            <div class="kpfk-pagination__info">Page ${this.currentPage} of ${totalPages}</div>
                            <div class="kpfk-pagination__buttons">
                                <button class="kpfk-btn kpfk-btn--primary kpfk-btn--small kp-page-btn" data-action="prev" ${this.currentPage === 1 ? 'disabled' : ''}>← Prev</button>
                                <button class="kpfk-btn kpfk-btn--primary kpfk-btn--small kp-page-btn" data-action="next" ${this.currentPage === totalPages ? 'disabled' : ''}>Next →</button>
                            </div>
                        </div>
                    `;
                }

                // Fixed playback bar
                html += `
                    <div class="kp-controls${this.audio ? ' active' : ''}">
                        <div class="kp-current-info">
                            <div class="kp-current-title">${this.currentEpisode?.headline || this.currentEpisode?.title || ''}</div>
                            <div class="kp-current-date">${this.currentEpisode?.date || ''}</div>
                        </div>
                        <div class="kp-progress">
                            <div class="kp-progress-fill"></div>
                        </div>
                        <div class="kp-bottom">
                            <div class="kp-playback-controls">
                                <button class="kp-skip" data-skip="-15" aria-label="Rewind 15 seconds">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.5 3C17.15 3 21.08 6.03 22.47 10.22L20.1 11C19.05 7.81 16.04 5.5 12.5 5.5c-1.54 0-2.96.46-4.15 1.24L10 8.5H4v-6l2.27 2.27A9.96 9.96 0 0 1 12.5 3z"/><text x="12" y="14" text-anchor="middle" font-size="7" fill="currentColor">15</text></svg>
                                </button>
                                <button class="kp-control-play" aria-label="Play/Pause">
                                    ${this.playing 
                                        ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'
                                        : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'}
                                </button>
                                <button class="kp-skip" data-skip="30" aria-label="Forward 30 seconds">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.5 3C6.85 3 2.92 6.03 1.53 10.22L3.9 11C4.95 7.81 7.96 5.5 11.5 5.5c1.54 0 2.96.46 4.15 1.24L14 8.5h6v-6l-2.27 2.27A9.96 9.96 0 0 0 11.5 3z"/><text x="12" y="14" text-anchor="middle" font-size="7" fill="currentColor">30</text></svg>
                                </button>
                            </div>
                            <div class="kp-time">
                                <span class="kp-current-time">0:00</span> / <span class="kp-total-time">0:00</span>
                            </div>
                            <div class="kp-speeds">
                                <button class="kp-speed" data-speed="1">1×</button>
                                <button class="kp-speed" data-speed="1.25">1.25×</button>
                                <button class="kp-speed" data-speed="1.5">1.5×</button>
                                <button class="kp-speed" data-speed="2">2×</button>
                            </div>
                        </div>
                    </div>
                `;

                this.container.innerHTML = html;
                this.progressFill = this.container.querySelector('.kp-progress-fill');
                this.currentTimeEl = this.container.querySelector('.kp-current-time');
                this.totalTimeEl = this.container.querySelector('.kp-total-time');

                const currentSpeed = this.audio?.playbackRate || 1;
                this.container.querySelectorAll('.kp-speed').forEach(btn => {
                    btn.classList.toggle('active', parseFloat(btn.dataset.speed) === currentSpeed);
                });
            }

            bindEvents() {
                this.container.querySelectorAll('.kp-play').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handlePlay(e));
                });
                const controlPlay = this.container.querySelector('.kp-control-play');
                if (controlPlay) controlPlay.addEventListener('click', () => this.togglePlayback());
                this.container.querySelectorAll('.kp-skip').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handleSkip(e));
                });
                const progressBar = this.container.querySelector('.kp-progress');
                if (progressBar) progressBar.addEventListener('click', (e) => this.handleSeek(e));
                this.container.querySelectorAll('.kp-speed').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handleSpeed(e));
                });
                this.container.querySelectorAll('.kp-page-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handlePaginate(e));
                });
                this.container.querySelectorAll('.kp-read-more').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handleReadMore(e));
                });
                this.container.querySelectorAll('.kp-download').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handleDownload(e));
                });
            }

            handlePlay(e) {
                const btn = e.currentTarget;
                const episodeEl = btn.closest('.kp-episode');
                const index = parseInt(episodeEl.dataset.index);
                const ep = this.episodes[index];

                if (this.currentIndex === index && this.audio) {
                    this.togglePlayback();
                    return;
                }

                if (this.audio) {
                    this.audio.pause();
                    this.audio = null;
                }

                this.currentIndex = index;
                this.currentEpisode = ep;
                this.currentEpisodeEl = episodeEl;
                this.audio = new Audio(ep.audioUrl);
                this.setupAudioEvents();
                this.audio.play();
                this.render();
                this.bindEvents();
                document.body.classList.add('kp-player-active');
            }

            setupAudioEvents() {
                this.audio.onplay = () => { this.playing = true; this.updatePlayButtons(); };
                this.audio.onpause = () => { this.playing = false; this.updatePlayButtons(); };
                this.audio.ontimeupdate = () => { this.updateProgress(); };
                this.audio.onended = () => {
                    if (this.autoplayNext && this.currentIndex < this.episodes.length - 1) {
                        this.playEpisode(this.currentIndex + 1);
                    } else {
                        this.playing = false;
                        this.updatePlayButtons();
                    }
                };
                this.audio.onerror = () => { this.playing = false; this.updatePlayButtons(); };
            }

            playEpisode(index) {
                if (this.audio) { this.audio.pause(); this.audio = null; }
                this.currentIndex = index;
                this.currentEpisode = this.episodes[index];
                this.audio = new Audio(this.currentEpisode.audioUrl);
                this.setupAudioEvents();
                this.audio.play();
                this.render();
                this.bindEvents();
            }

            togglePlayback() {
                if (!this.audio) return;
                this.audio.paused ? this.audio.play() : this.audio.pause();
            }

            updatePlayButtons() {
                const episodeBtn = this.container.querySelector(`.kp-episode[data-index="${this.currentIndex}"] .kp-play`);
                if (episodeBtn) {
                    episodeBtn.innerHTML = this.playing 
                        ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'
                        : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
                }
                const nowPlaying = this.container.querySelector(`.kp-episode[data-index="${this.currentIndex}"] .kp-now-playing`);
                if (nowPlaying) nowPlaying.classList.toggle('active', this.playing);
                const controlBtn = this.container.querySelector('.kp-control-play');
                if (controlBtn) {
                    controlBtn.innerHTML = this.playing
                        ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'
                        : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
                }
            }

            updateProgress() {
                if (!this.audio || !this.audio.duration) return;
                const percent = (this.audio.currentTime / this.audio.duration) * 100;
                if (this.progressFill) this.progressFill.style.width = `${percent}%`;
                if (this.currentTimeEl) this.currentTimeEl.textContent = this.formatTime(this.audio.currentTime);
                if (this.totalTimeEl) this.totalTimeEl.textContent = this.formatTime(this.audio.duration);
            }

            handleSkip(e) {
                if (!this.audio) return;
                const seconds = parseInt(e.currentTarget.dataset.skip);
                this.audio.currentTime = Math.max(0, Math.min(this.audio.duration, this.audio.currentTime + seconds));
            }

            handleSeek(e) {
                if (!this.audio || !this.audio.duration) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                this.audio.currentTime = percent * this.audio.duration;
            }

            handleSpeed(e) {
                const speed = parseFloat(e.currentTarget.dataset.speed);
                if (this.audio) this.audio.playbackRate = speed;
                this.container.querySelectorAll('.kp-speed').forEach(btn => {
                    btn.classList.toggle('active', parseFloat(btn.dataset.speed) === speed);
                });
            }

            handlePaginate(e) {
                if (this.loading) return;
                const action = e.currentTarget.dataset.action;
                const totalPages = Math.ceil(this.episodes.length / this.episodesPerPage);
                if (action === 'next' && this.currentPage < totalPages) this.currentPage++;
                else if (action === 'prev' && this.currentPage > 1) this.currentPage--;
                else return;
                this.loading = true;
                const currentSpeed = this.audio?.playbackRate || 1;
                this.render();
                this.bindEvents();
                if (this.audio) this.audio.playbackRate = currentSpeed;
                this.loading = false;
            }

            handleReadMore(e) {
                const btn = e.currentTarget;
                const desc = btn.previousElementSibling;
                if (desc.classList.contains('expanded')) {
                    desc.classList.remove('expanded');
                    btn.textContent = 'Read more...';
                } else {
                    desc.classList.add('expanded');
                    btn.textContent = 'Read less';
                }
            }

            handleDownload(e) {
                const btn = e.currentTarget;
                const url = btn.dataset.url;
                const title = btn.dataset.title;
                const a = document.createElement('a');
                a.href = url;
                a.download = `${title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.mp3`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            formatTime(seconds) {
                if (!seconds || !isFinite(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        function initKPFKPlayers() {
            const defaultContainer = document.getElementById('kpfk-player');
            if (defaultContainer) new KPFKPlayer('kpfk-player');
            document.querySelectorAll('[id^="kpfk-player-"]').forEach(container => {
                const showCode = container.id.replace('kpfk-player-', '');
                new KPFKPlayer(container.id, { show: showCode });
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initKPFKPlayers);
        } else {
            initKPFKPlayers();
        }

        window.createKPFKPlayer = function(containerId, options = {}) {
            return new KPFKPlayer(containerId, options);
        };
    </script>
</body>
</html>
