services:
  cms:
    image: ghcr.io/aestwick/crm:latest
    container_name: kpfk-cms
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cms.rule=Host(`cms.kpfk.org`)"
      - "traefik.http.routers.cms.entrypoints=websecure"
      - "traefik.http.routers.cms.tls.certresolver=mytlschallenge"
      - "traefik.http.services.cms.loadbalancer.server.port=3000"
    networks:
      - traefik

networks:
  traefik:
    external: true
